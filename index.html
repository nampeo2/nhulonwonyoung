<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Giờ Làm</title>
<style>
:root{
  --bg:#0f1115;
  --card:#1c1f26;
  --text:#e6e6e6;
  --muted:#9aa0a6;
  --accent:#2f6df6;
  --green:#2ecc71;
  --red:#e74c3c;
}

body{font-family:-apple-system;background:var(--bg);color:var(--text);margin:0}
.card{background:var(--card);margin:12px;padding:14px;border-radius:16px}
button{padding:10px;border-radius:10px;border:none;margin:4px;cursor:pointer;color:#fff;transition:0.2s;background:#3a3f4b}

/* primary buttons */
.start{background:var(--green)}
.stop{background:var(--red)}

/* secondary buttons */
button:not(.start):not(.stop){background:#3a3f4b}

/* delete button */
.delete{background:#a94442}
.delete:hover{background:#c0392b}
button:not(.start):not(.stop):hover{background:#4a5160}
button:disabled{background:#555;cursor:not-allowed;opacity:0.6}
button:hover:not(:disabled){filter:brightness(1.1)}

.square{width:80px;height:80px;border-radius:12px;font-size:14px}

.start{background:var(--green)}
.stop{background:var(--red)}

input{padding:6px;margin:4px;border-radius:6px;border:1px solid #333;background:#111;color:var(--text)}
.row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}

/* new item animation */
@keyframes slideFadeIn{
  from{opacity:0; transform:translateY(8px);} 
  to{opacity:1; transform:translateY(0);} 
}
.new-item{animation:slideFadeIn 0.25s ease}

/* edit highlight */
@keyframes highlight{
  from{background:#3a4150;} 
  to{background:transparent;}
}
.highlight{animation:highlight 0.6s ease}

/* delete animation */
@keyframes fadeOut{
  from{opacity:1; transform:translateY(0);} 
  to{opacity:0; transform:translateY(-6px);} 
}
.fade-out{animation:fadeOut 0.25s ease forwards}

.status{font-size:14px;margin-top:8px}

/* animations */
@keyframes pulse {
  0%{transform:scale(1);}
  50%{transform:scale(1.08);}
  100%{transform:scale(1);}
}

@keyframes flash {
  0%{opacity:1;}
  50%{opacity:0.4;}
  100%{opacity:1;}
}

.pulse{animation:pulse 0.3s ease}
.flash{animation:flash 0.4s ease}

</style>
</head>
<body>

<div class="card">
<button id="startBtn" class="square start" onclick="startSession()">Start</button>
<button id="stopBtn" class="square stop" onclick="stopSession()">Stop</button>
<div id="status" class="status"></div>
</div>

<div class="card">
<b>Export CSV</b><br>
<input type="date" id="from">
<input type="date" id="to"><br>
<button onclick="exportCSV()">⬇️ Export</button>
</div>

<div class="card">
<div style="display:flex;justify-content:space-between;align-items:center">
  <b>Sessions</b>
  <button onclick="undo()">↩️ Undo</button>
</div>
<ul id="sessionList"></ul>
</div>

<script>
let sessions=JSON.parse(localStorage.getItem('sessions'))||[];
let history=[];
let lastEditedIndex = null;

function save(){localStorage.setItem('sessions',JSON.stringify(sessions));}
function cloneSessions(){return JSON.parse(JSON.stringify(sessions));}
function round15(ts){return Math.round(ts/(15*60000))*(15*60000);}

function toLocalISOString(date){
  const tzOffset = date.getTimezoneOffset() * 60000;
  return new Date(date - tzOffset).toISOString();
}

function startSession(){
  let btn = document.getElementById('startBtn');
  if(btn){
    btn.classList.add('pulse');
    setTimeout(()=>btn.classList.remove('pulse'),300);
  }
  let open = sessions.find(s=>!s.end);
  if(open) return;

  history.push(cloneSessions());
  sessions.push({start:round15(Date.now()), end:null});
  save();
  renderSessions();
}

function stopSession(){
  let btn = document.getElementById('stopBtn');
  if(btn){
    btn.classList.add('flash');
    setTimeout(()=>btn.classList.remove('flash'),400);
  }
  let open = sessions.find(s=>!s.end);
  if(!open) return;

  history.push(cloneSessions());
  open.end = round15(Date.now());
  save();
  renderSessions();
}

function filterRange(){
  let fromVal=document.getElementById('from').value;
  let toVal=document.getElementById('to').value;

  let from=fromVal?new Date(fromVal+"T00:00:00").getTime():0;
  let to=toVal?new Date(toVal+"T23:59:59").getTime():Date.now();

  return sessions.filter(s=>s.start>=from && s.end && s.end<=to);
}

function formatTime(ts){
  let d=new Date(ts);
  return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function minutesToHours(mins){
  return (mins/60).toFixed(2);
}

function buildCSV(data){
  data = data.slice().sort((a,b)=>a.start - b.start);

  let rows=[["Date","Start","End","Hours"]];
  let total=0;

  data.forEach(s=>{
    let d=new Date(s.start).toLocaleDateString();
    let dur=Math.round((s.end-s.start)/60000);
    total+=dur;
    rows.push([d,formatTime(s.start),formatTime(s.end),minutesToHours(dur)]);
  });

  rows.push(["TOTAL","","",minutesToHours(total)]);

  return "sep=;\n" + rows.map(r=>r.join(";")).join("\n");
}

function exportCSV(){
  let csv=buildCSV(filterRange());
  let blob=new Blob([csv],{type:'text/csv'});
  let a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='timelog.csv';
  a.click();
}

function toTimeInput(ts){
  return toLocalISOString(new Date(ts)).slice(11,16);
}
function toDateInput(ts){
  return toLocalISOString(new Date(ts)).slice(0,10);
}

function renderSessions(){
  let startBtn = document.getElementById('startBtn');
  let stopBtn = document.getElementById('stopBtn');
  let status = document.getElementById('status');

  let hasOpen = sessions.some(s=>!s.end);

  if(startBtn) startBtn.disabled = hasOpen;
  if(stopBtn) stopBtn.disabled = !hasOpen;

  if(status){
    status.innerText = hasOpen ? "🟢 Đang ghi thời gian" : "⚪ Chưa bắt đầu";
  }

  let list=document.getElementById('sessionList');
  list.innerHTML='';

  sessions.sort((a,b)=>a.start - b.start);

  sessions.forEach((s,i)=>{
    let li=document.createElement('li');

    // animate item mới (item cuối cùng)
    if(i === sessions.length - 1){
      li.classList.add('new-item');
    }
    li.className='row';

    if(!s.end){
      li.style.background = '#2a2f3a';
      li.style.borderRadius = '8px';
      li.style.padding = '4px';
    }

    let mins = s.end ? Math.round((s.end-s.start)/60000) : 0;

    li.innerHTML=`
      <input type="date" value="${toDateInput(s.start)}" onchange="editDate(${i}, this.value)">
      <input type="time" value="${toTimeInput(s.start)}" onchange="editTime(${i},'start',this.value)">
      -
      <input type="time" value="${s.end?toTimeInput(s.end):''}" onchange="editTime(${i},'end',this.value)">
      (${s.end?minutesToHours(mins)+'h':'...'})
      <button class="delete" onclick="deleteSession(${i})">🗑</button>
    `;
    
    // highlight nếu vừa edit
    if(i === lastEditedIndex){
      li.classList.add('highlight');
    }

    list.appendChild(li);
  });
}

function editDate(i,value){
  lastEditedIndex = i;
  history.push(cloneSessions());
  let s=sessions[i];
  let start=new Date(s.start);
  let [y,m,d]=value.split('-');
  start.setFullYear(y, m-1, d);
  s.start=round15(start.getTime());

  if(s.end){
    let end=new Date(s.end);
    end.setFullYear(y, m-1, d);
    s.end=round15(end.getTime());
  }

  save();
  renderSessions();
}

function editTime(i,type,value){
  lastEditedIndex = i;
  history.push(cloneSessions());
  let s=sessions[i];

  let base = new Date(type==='start'?s.start:(s.end||s.start));
  let [h,m]=value.split(':');
  base.setHours(h); base.setMinutes(m);

  if(type==='start') s.start=round15(base.getTime());
  else s.end=round15(base.getTime());

  save();
  renderSessions();
}

function deleteSession(i){
  let list=document.getElementById('sessionList');
  let item=list.children[i];

  if(item){
    item.classList.add('fade-out');
    setTimeout(()=>{
      history.push(cloneSessions());
      sessions.splice(i,1);
      save();
      renderSessions();
    },250);
  }
}

function undo(){
  if(history.length===0)return alert('Nothing to undo');
  sessions=history.pop();
  save();
  renderSessions();
}

renderSessions();

/* ===== JSON BACKUP SYSTEM ===== */
<div class="card">
<b>Backup JSON</b><br>
<button onclick="exportJSON()">⬇️ Export JSON Backup</button>
<br><br>
<input type="file" id="importFile" accept="application/json">
<button onclick="importJSON()">⬆️ Import & Merge</button>
<div style="font-size:13px;color:#9aa0a6;margin-top:6px">
Import sẽ MERGE dữ liệu, không ghi đè.
</div>
</div>


function sessionKey(s){
  return `${s.start}-${s.end||0}`;
}

function exportJSON(){
  let data={
    version:1,
    exportedAt:Date.now(),
    sessions:sessions
  };

  let blob=new Blob(
    [JSON.stringify(data,null,2)],
    {type:'application/json'}
  );

  let a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='timelog-backup.json';
  a.click();
}

function importJSON(){
  const input=document.getElementById('importFile');
  if(!input.files.length){
    alert('Chọn file JSON trước');
    return;
  }

  const file=input.files[0];
  const reader=new FileReader();

  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);

      if(!data.sessions){
        alert('File không hợp lệ');
        return;
      }

      history.push(cloneSessions());

      const existing=new Set(
        sessions.map(sessionKey)
      );

      let added=0;

      data.sessions.forEach(s=>{
        const key=sessionKey(s);

        if(!existing.has(key)){
          sessions.push({
            start:s.start,
            end:s.end||null
          });
          existing.add(key);
          added++;
        }
      });

      save();
      renderSessions();

      alert(`✅ Import xong\nThêm ${added} session mới`);

    }catch(err){
      alert('JSON lỗi');
      console.error(err);
    }
  };

  reader.readAsText(file);
}
/* ===== END JSON BACKUP ===== */
</script>

</body>
</html>
