<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Time Logger ScreenTime Style</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:-apple-system;margin:0;background:#f2f2f7;color:#000}
.header{padding:16px;font-size:22px;font-weight:600}
.card{background:#fff;border-radius:18px;padding:14px;margin:12px}
.row{display:flex;justify-content:space-between;align-items:center}
.big-btn{width:80px;height:80px;border-radius:50%;border:none;font-size:14px}
.start{background:#34c759;color:#fff}
.stop{background:#ff3b30;color:#fff}
.small{font-size:13px;color:#555}
input,select{padding:8px;border-radius:10px;border:1px solid #ddd}
ul{list-style:none;padding:0;margin:0}
li{padding:10px;border-bottom:1px solid #eee}
</style>
</head>
<body>

<div class="header">Screen Time</div>

<div class="card row">
<select id="tag"></select>
<div>
<button class="big-btn start" onclick="startSession()">Start</button>
<button class="big-btn stop" onclick="stopSession()">Stop</button>
</div>
</div>

<div class="card">
<div id="today" style="font-size:18px;font-weight:600">Today: 0h</div>
<div class="small" id="status">Idle</div>
</div>

<div class="card">
<select id="range" onchange="render()">
<option value="7">7 days</option>
<option value="30">30 days</option>
<option value="90">90 days</option>
</select>
<canvas id="chart"></canvas>
</div>

<div class="card">
<b>Tags</b>
<ul id="tagList"></ul>
<input id="newTag" placeholder="New tag">
<button onclick="addTag()">Add</button>
</div>

<div class="card">
<b>Sessions</b>
<ul id="sessionList"></ul>
</div>

<script>
let sessions = JSON.parse(localStorage.getItem("sessions"))||[];
let active = JSON.parse(localStorage.getItem("active"))||null;
let tags = JSON.parse(localStorage.getItem("tags"))||["Work","Study"];

function save(){
localStorage.setItem("sessions",JSON.stringify(sessions));
localStorage.setItem("active",JSON.stringify(active));
localStorage.setItem("tags",JSON.stringify(tags));
}

function renderTags(){
let sel=document.getElementById("tag");
sel.innerHTML="";
tags.forEach(t=>{
let o=document.createElement("option");o.text=t;sel.add(o);
});

let list=document.getElementById("tagList");
list.innerHTML="";
tags.forEach((t,i)=>{
let li=document.createElement("li");
li.innerHTML=`${t} <button onclick="renameTag(${i})">Edit</button>`;
list.appendChild(li);
});
}

function addTag(){
let v=document.getElementById("newTag").value;
if(v){tags.push(v);save();renderTags();}
}

function renameTag(i){
let n=prompt("Rename tag",tags[i]);
if(n){tags[i]=n;save();renderTags();}
}

function startSession(){
if(active)return;
active={start:Date.now(),tag:getTag()};
save();render();
}

function stopSession(){
if(!active)return;
let end=Date.now();
let last=sessions[sessions.length-1];
if(last && Math.abs(last.end-end)<60000){active=null;save();render();return;}
sessions.push({start:active.start,end:end,tag:active.tag});
active=null;save();render();
}

function getTag(){return document.getElementById("tag").value;}

function editSession(i){
let s=sessions[i];
let newStart=prompt("Start (timestamp)",s.start);
let newEnd=prompt("End (timestamp)",s.end);
if(newStart && newEnd){
s.start=parseInt(newStart);
s.end=parseInt(newEnd);
sessions[i]=s;save();render();
}
}

function renderSessions(){
let list=document.getElementById("sessionList");
list.innerHTML="";
sessions.slice().reverse().forEach((s,i)=>{
let li=document.createElement("li");
let dur=Math.round((s.end-s.start)/60000);
li.innerHTML=`${s.tag} • ${dur}m <button onclick="editSession(${sessions.length-1-i})">Edit</button>`;
list.appendChild(li);
});
}

function calcToday(){
let total=0;let today=new Date().toDateString();
sessions.forEach(s=>{
let d=new Date(s.start);
if(d.toDateString()===today){total+=(s.end-s.start);} });
let h=Math.floor(total/3600000);
let m=Math.floor((total%3600000)/60000);
document.getElementById("today").innerText=`Today: ${h}h ${m}m`;
}

function buildChart(){
let days=parseInt(document.getElementById("range").value);
let map={};
for(let i=days-1;i>=0;i--){
let d=new Date();d.setDate(d.getDate()-i);
map[d.toDateString()]=0;
}
sessions.forEach(s=>{
let k=new Date(s.start).toDateString();
if(map[k]!=null){map[k]+=(s.end-s.start)/3600000;}
});
new Chart(document.getElementById("chart"),{
type:'bar',
data:{labels:Object.keys(map),datasets:[{data:Object.values(map)}]}
});
}

function render(){
document.getElementById("status").innerText=active?"Running...":"Idle";
document.getElementById("chart").replaceWith(document.getElementById("chart").cloneNode());
calcToday();renderSessions();buildChart();
}

renderTags();render();
</script>

</body>
</html>
