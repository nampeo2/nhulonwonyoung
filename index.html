<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Time Logger Pro v3</title>
<style>
body{font-family:-apple-system;background:#f2f2f7;margin:0}
.card{background:#fff;margin:12px;padding:14px;border-radius:16px}
button{padding:10px;border-radius:10px;border:none;margin:4px;cursor:pointer}
.big{width:80px;height:80px;border-radius:50%}
.start{background:#34c759;color:#fff}
.stop{background:#ff3b30;color:#fff}
input{padding:6px;margin:4px;border-radius:6px;border:1px solid #ccc}
</style>
</head>
<body>

<div class="card">
<button class="big start" onclick="startSession()">Start</button>
<button class="big stop" onclick="stopSession()">Stop</button>
<button onclick="undo()">Undo</button>
</div>

<div class="card">
<b>Export CSV</b><br>
<input type="date" id="from">
<input type="date" id="to"><br>
<button onclick="exportCSV()">Export</button>
</div>

<div class="card">
<b>Sessions</b>
<ul id="sessionList"></ul>
</div>

<script>
let sessions=JSON.parse(localStorage.getItem('sessions'))||[];
let active=null;
let history=[]; // for undo

function save(){
  localStorage.setItem('sessions',JSON.stringify(sessions));
}

function cloneSessions(){
  return JSON.parse(JSON.stringify(sessions));
}

function round15(ts){return Math.round(ts/(15*60000))*(15*60000);}

function startSession(){
  active={start:Date.now()};
  alert('Started');
}

function stopSession(){
  if(!active)return alert('No active session');
  history.push(cloneSessions());

  let end=Date.now();
  let s={start:round15(active.start),end:round15(end)};
  sessions.push(s);
  active=null;
  save();
  renderSessions();
  alert('Saved');
}

function filterRange(){
  let fromVal=document.getElementById('from').value;
  let toVal=document.getElementById('to').value;

  let from=fromVal?new Date(fromVal).getTime():0;
  let to=toVal?new Date(toVal).getTime()+86400000:Date.now();

  return sessions.filter(s=>s.start>=from && s.end<=to);
}

function formatTime(ts){
  let d=new Date(ts);
  return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function buildCSV(data){
  let rows=[["Date","Start","End","Minutes"]];
  let total=0;

  data.forEach(s=>{
    let d=new Date(s.start).toLocaleDateString();
    let dur=(s.end-s.start)/60000;
    total+=dur;

    rows.push([
      d,
      formatTime(s.start),
      formatTime(s.end),
      Math.round(dur)
    ]);
  });

  rows.push(["TOTAL","","",Math.round(total)]);
  return rows.map(r=>r.join(",")).join("\n");
}

function exportCSV(){
  let csv=buildCSV(filterRange());
  let blob=new Blob([csv],{type:'text/csv'});
  let a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='timelog.csv';
  a.click();
}

function renderSessions(){
  let list=document.getElementById('sessionList');
  list.innerHTML='';

  sessions.forEach((s,i)=>{
    let li=document.createElement('li');
    li.innerHTML=`
      ${new Date(s.start).toLocaleDateString()} 
      <input type="time" value="${toTimeInput(s.start)}" onchange="editTime(${i},'start',this.value)">
      -
      <input type="time" value="${toTimeInput(s.end)}" onchange="editTime(${i},'end',this.value)">
      (${Math.round((s.end-s.start)/60000)}m)
      <button onclick="deleteSession(${i})">X</button>
    `;
    list.appendChild(li);
  });
}

function toTimeInput(ts){
  let d=new Date(ts);
  return d.toISOString().slice(11,16);
}

function editTime(i,type,value){
  history.push(cloneSessions());

  let s=sessions[i];
  let d=new Date(type==='start'?s.start:s.end);

  let [h,m]=value.split(':');
  d.setHours(h);
  d.setMinutes(m);

  if(type==='start') s.start=round15(d.getTime());
  else s.end=round15(d.getTime());

  save();
  renderSessions();
}

function deleteSession(i){
  history.push(cloneSessions());
  sessions.splice(i,1);
  save();
  renderSessions();
  alert('Deleted');
}

function undo(){
  if(history.length===0)return alert('Nothing to undo');
  sessions=history.pop();
  save();
  renderSessions();
  alert('Undo done');
}

renderSessions();
</script>

</body>
</html>
