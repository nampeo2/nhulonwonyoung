<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Time Logger Pro v2</title>
<style>
body{font-family:-apple-system;background:#f2f2f7;margin:0}
.card{background:#fff;margin:12px;padding:14px;border-radius:16px}
button{padding:10px;border-radius:10px;border:none;margin:4px;cursor:pointer}
.big{width:80px;height:80px;border-radius:50%}
.start{background:#34c759;color:#fff}
.stop{background:#ff3b30;color:#fff}
.tag-color{width:16px;height:16px;display:inline-block;border-radius:4px;margin-right:6px}
</style>
</head>
<body>

<div class="card">
<select id="tag"></select>
<button onclick="editTag()">Edit Tag</button>
<button class="big start" onclick="startSession()">Start</button>
<button class="big stop" onclick="stopSession()">Stop</button>
</div>

<div class="card">
<b>Export</b><br>
<input type="date" id="from">
<input type="date" id="to"><br>
<button onclick="previewExport()">Preview</button>
<button onclick="exportCSV()">Export CSV</button>
<button onclick="exportJSON()">Export JSON</button>
</div>

<div class="card">
<b>Delete specific session</b><br>
<ul id="sessionList"></ul>
</div>

<div class="card" id="previewBox"></div>

<script>
let sessions=JSON.parse(localStorage.getItem('sessions'))||[];
let active=null;
let tags=JSON.parse(localStorage.getItem('tags'))||[
  {name:'Work',color:'#34c759'},
  {name:'Study',color:'#007aff'}
];

function save(){
  localStorage.setItem('sessions',JSON.stringify(sessions));
  localStorage.setItem('tags',JSON.stringify(tags));
}

function renderTags(){
  let sel=document.getElementById('tag');
  sel.innerHTML='';
  tags.forEach(t=>{
    let o=document.createElement('option');
    o.value=t.name;
    o.text=t.name;
    sel.add(o);
  });
}

function editTag(){
  let current=getTag();
  let t=tags.find(x=>x.name===current);
  let newName=prompt('Rename tag',t.name);
  let newColor=prompt('Color (hex)',t.color);
  if(!newName)return;

  t.name=newName;
  t.color=newColor||t.color;

  sessions.forEach(s=>{if(s.tag===current)s.tag=newName});
  save();renderTags();alert('Tag updated');
}

function getTag(){return document.getElementById('tag').value}

function round15(ts){return Math.round(ts/(15*60000))*(15*60000);}

function startSession(){
  active={start:Date.now(),tag:getTag()};
  alert('Started');
}

function stopSession(){
  if(!active)return alert('No active session');
  let end=Date.now();
  let s={start:round15(active.start),end:round15(end),tag:active.tag};
  sessions.push(s);
  active=null;
  save();
  renderSessions();
  alert('Saved');
}

function filterRange(){
  let from=new Date(document.getElementById('from').value).getTime();
  let to=new Date(document.getElementById('to').value).getTime()+86400000;
  return sessions.filter(s=>s.start>=from && s.end<=to);
}

function formatTime(ts){
  let d=new Date(ts);
  return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function buildCSV(data){
  let rows=[["Date","Start","End","Minutes","Tag"]];
  let total=0;

  data.forEach(s=>{
    let d=new Date(s.start).toLocaleDateString();
    let dur=(s.end-s.start)/60000;
    total+=dur;
    rows.push([
      d,
      formatTime(s.start),
      formatTime(s.end),
      Math.round(dur),
      s.tag
    ]);
  });

  rows.push(["TOTAL","","",Math.round(total),""]);
  return rows.map(r=>r.join(",")).join("\n");
}

function previewExport(){
  let data=filterRange();
  let csv=buildCSV(data);
  document.getElementById('previewBox').innerText=csv;
}

function exportCSV(){
  let csv=buildCSV(filterRange());
  let blob=new Blob([csv],{type:'text/csv'});
  let a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='timelog.csv';
  a.click();
}

function exportJSON(){
  let data=filterRange();
  let blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  let a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='timelog.json';
  a.click();
}

function renderSessions(){
  let list=document.getElementById('sessionList');
  list.innerHTML='';

  sessions.forEach((s,i)=>{
    let li=document.createElement('li');
    li.innerHTML=`${new Date(s.start).toLocaleDateString()} ${formatTime(s.start)} - ${formatTime(s.end)} (${s.tag}) <button onclick="deleteSession(${i})">X</button>`;
    list.appendChild(li);
  });
}

function deleteSession(i){
  sessions.splice(i,1);
  save();
  renderSessions();
  alert('Deleted');
}

renderTags();
renderSessions();
</script>

</body>
</html>
