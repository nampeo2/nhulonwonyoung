<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Giờ Làm</title>
<style>
:root{
  --bg:#0f1115;
  --card:#1c1f26;
  --text:#e6e6e6;
  --muted:#9aa0a6;
  --accent:#2f6df6;
  --glow:#5b8cff;
}

body{font-family:-apple-system;background:var(--bg);color:var(--text);margin:0}
.card{background:var(--card);margin:12px;padding:14px;border-radius:16px}
button{padding:10px;border-radius:10px;border:none;margin:4px;cursor:pointer;background:var(--accent);color:#fff;transition:all 0.2s ease}
.square{width:80px;height:80px;border-radius:12px;font-size:14px;position:relative}

/* Active animation */
.active{
  box-shadow:0 0 0 0 var(--glow);
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(91,140,255,0.6)}
  70%{box-shadow:0 0 0 16px rgba(91,140,255,0)}
  100%{box-shadow:0 0 0 0 rgba(91,140,255,0)}
}

input{padding:6px;margin:4px;border-radius:6px;border:1px solid #333;background:#111;color:var(--text)}
.row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
</style>
</head>
<body>

<div class="card">
<button id="startBtn" class="square" onclick="startSession()">Start</button>
<button id="stopBtn" class="square" onclick="stopSession()">Stop</button>
</div>

<div class="card">
<b>Export CSV</b><br>
<input type="date" id="from">
<input type="date" id="to"><br>
<button onclick="exportCSV()">Export</button>
</div>

<div class="card">
<div style="display:flex;justify-content:space-between;align-items:center">
  <b>Sessions</b>
  <button onclick="undo()">Undo</button>
</div>
<ul id="sessionList"></ul>
</div>

<script>
let sessions=JSON.parse(localStorage.getItem('sessions'))||[];
let active=null;
let history=[];

function save(){localStorage.setItem('sessions',JSON.stringify(sessions));}
function cloneSessions(){return JSON.parse(JSON.stringify(sessions));}
function round15(ts){return Math.round(ts/(15*60000))*(15*60000);}

function setRunningUI(running){
  const startBtn=document.getElementById('startBtn');
  const stopBtn=document.getElementById('stopBtn');

  if(running){
    startBtn.classList.add('active');
    stopBtn.classList.remove('active');
  }else{
    startBtn.classList.remove('active');
    stopBtn.classList.add('active');
  }
}

function startSession(){
  active={start:Date.now()};
  setRunningUI(true);
  alert('Started');
}

function stopSession(){
  if(!active)return alert('No active session');
  history.push(cloneSessions());
  let end=Date.now();
  sessions.push({start:round15(active.start),end:round15(end)});
  active=null;
  setRunningUI(false);
  save();
  renderSessions();
  alert('Saved');
}

function filterRange(){
  let fromVal=document.getElementById('from').value;
  let toVal=document.getElementById('to').value;
  let from=fromVal?new Date(fromVal).getTime():0;
  let to=toVal?new Date(toVal).getTime()+86400000:Date.now();
  return sessions.filter(s=>s.start>=from && s.end<=to);
}

function formatTime(ts){
  let d=new Date(ts);
  return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false});
});
}

function buildCSV(data){
  let rows=[["Date","Start","End","Hours"]];
  let total=0;

  data.forEach(s=>{
    let d=new Date(s.start).toLocaleDateString();
    let dur=(s.end-s.start)/3600000;
    total+=dur;

    rows.push([
      d,
      formatTime(s.start),
      formatTime(s.end),
      dur.toFixed(2)
    ]);
  });

  rows.push(["TOTAL","","",total.toFixed(2)]);
  return rows.map(r=>r.join(",")).join("
");
});
  rows.push(["TOTAL","","",Math.round(total)]);
  return rows.map(r=>r.join(",")).join("\n");
}

function exportCSV(){
  let csv=buildCSV(filterRange());
  let blob=new Blob([csv],{type:'text/csv'});
  let a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='timelog.csv';
  a.click();
}

function toTimeInput(ts){
  let d=new Date(ts);
  let h=d.getHours().toString().padStart(2,'0');
  let m=d.getMinutes().toString().padStart(2,'0');
  return `${h}:${m}`;
} 
function toDateInput(ts){
  let d=new Date(ts);
  let y=d.getFullYear();
  let m=(d.getMonth()+1).toString().padStart(2,'0');
  let day=d.getDate().toString().padStart(2,'0');
  return `${y}-${m}-${day}`;
} 

function renderSessions(){
  let list=document.getElementById('sessionList');
  list.innerHTML='';
  sessions.forEach((s,i)=>{
    let li=document.createElement('li');
    li.className='row';
    li.innerHTML=`
      <input type="date" value="${toDateInput(s.start)}" onchange="editDate(${i}, this.value)">
      <input type="time" value="${toTimeInput(s.start)}" onchange="editTime(${i},'start',this.value)">
      -
      <input type="time" value="${toTimeInput(s.end)}" onchange="editTime(${i},'end',this.value)">
      (${((s.end-s.start)/3600000).toFixed(2)}h)
      <button onclick="deleteSession(${i})">X</button>
    `;
    list.appendChild(li);
  });
}

function editDate(i,value){
  history.push(cloneSessions());
  let s=sessions[i];
  let start=new Date(s.start);
  let end=new Date(s.end);
  let [y,m,d]=value.split('-');
  start.setFullYear(y, m-1, d);
  end.setFullYear(y, m-1, d);
  s.start=round15(start.getTime());
  s.end=round15(end.getTime());
  save();
  renderSessions();
}

function editTime(i,type,value){
  history.push(cloneSessions());
  let s=sessions[i];
  let d=new Date(type==='start'?s.start:s.end);
  let [h,m]=value.split(':');
  d.setHours(h); d.setMinutes(m);
  if(type==='start') s.start=round15(d.getTime());
  else s.end=round15(d.getTime());
  save();
  renderSessions();
}

function deleteSession(i){
  history.push(cloneSessions());
  sessions.splice(i,1);
  save();
  renderSessions();
  alert('Deleted');
}

function undo(){
  if(history.length===0)return alert('Nothing to undo');
  sessions=history.pop();
  save();
  renderSessions();
  alert('Undo done');
}

renderSessions();
</script>

</body>
</html>
