<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Time Logger Final+</title>
<style>
body{font-family:-apple-system;background:#f2f2f7;margin:0}
.card{background:#fff;margin:12px;padding:14px;border-radius:16px}
button{padding:8px 10px;border-radius:10px;border:none;margin:3px}
.big{width:70px;height:70px;border-radius:50%}
.start{background:#34c759;color:#fff}
.stop{background:#ff3b30;color:#fff}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#000;color:#fff;padding:10px 16px;border-radius:20px;opacity:0;transition:.3s}
.toast.show{opacity:1}
.group{margin-top:10px}
.session{display:flex;justify-content:space-between;font-size:13px}
</style>
</head>
<body>

<div class="card">
<select id="tag"></select>
<input type="color" id="color" onchange="setColor()">
<button onclick="renameTag()">Rename</button>
<button class="big start" onclick="startSession()">Start</button>
<button class="big stop" onclick="stopSession()">Stop</button>
</div>

<div class="card">
<b>Filter</b><br>
<select id="filterTag" onchange="render()">
<option value="all">All</option>
</select>
</div>

<div class="card">
<b>Sessions</b>
<div id="list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
let sessions=JSON.parse(localStorage.getItem('sessions'))||[];
let tags=JSON.parse(localStorage.getItem('tags'))||['Work','Study'];
let colors=JSON.parse(localStorage.getItem('colors'))||{};
let active=null;
let undoStack=[];

function save(){
localStorage.setItem('sessions',JSON.stringify(sessions));
localStorage.setItem('tags',JSON.stringify(tags));
localStorage.setItem('colors',JSON.stringify(colors));
}

function pushUndo(){undoStack.push(JSON.stringify(sessions)); if(undoStack.length>20) undoStack.shift();}

function undo(){
if(!undoStack.length)return;
sessions=JSON.parse(undoStack.pop());
save();render();toast('Undo');
}

function toast(msg){
let t=toastEl;
t.innerText=msg;
t.classList.add('show');
setTimeout(()=>t.classList.remove('show'),2000);
}

const toastEl=document.getElementById('toast');

function renderTags(){
tag.innerHTML=''; filterTag.innerHTML='<option value="all">All</option>';
tags.forEach(t=>{
let o=document.createElement('option');o.text=t;tag.add(o);
let f=document.createElement('option');f.text=t;filterTag.add(f);
});
}

function setColor(){colors[getTag()]=color.value;save();toast('Color updated');}

function renameTag(){
let old=getTag();
let n=prompt('Rename',old);
if(!n)return;
tags=tags.map(t=>t===old?n:t);
sessions.forEach(s=>{if(s.tag===old)s.tag=n});
save();// ===== Merge function =====
function mergeSessions(list){
  // sort by start
  list.sort((a,b)=>a.start-b.start);

  let merged=[];

  list.forEach(s=>{
    let last=merged[merged.length-1];

    if(last && last.tag===s.tag && s.start<=last.end){
      // overlap or touch → merge
      last.end=Math.max(last.end,s.end);
    }else{
      merged.push({...s});
    }
  });

  return merged;
}

renderTags();render();toast('Renamed');
}

function getTag(){return tag.value}

function round15(ts){
let d=new Date(ts);
let m=d.getMinutes();
if(m>52){d.setHours(d.getHours()+1);d.setMinutes(0);} else d.setMinutes(Math.round(m/15)*15);
d.setSeconds(0);d.setMilliseconds(0);
return d.getTime();
}

function startSession(){active={start:Date.now(),tag:getTag()};toast('Started');}

function stopSession(){
if(!active)return;
pushUndo();
let newSession={start:round15(active.start),end:round15(Date.now()),tag:active.tag};

// merge logic
sessions.push(newSession);
sessions=mergeSessions(sessions);

active=null;save();render();toast('Saved');
});
active=null;save();render();toast('Saved');
}

function editSession(i){
let s=sessions[i];
let start=prompt('Start (HH:MM)', new Date(s.start).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}));
let end=prompt('End (HH:MM)', new Date(s.end).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}));
if(!start||!end)return;

let d=new Date(s.start);
let [sh,sm]=start.split(':');
let [eh,em]=end.split(':');
d.setHours(sh,sm);
let newStart=d.getTime();
d.setHours(eh,em);
let newEnd=d.getTime();

pushUndo();
sessions[i]={...s,start:newStart,end:newEnd};

// merge after edit
sessions=mergeSessions(sessions);

save();render();toast('Edited');
}));
let end=prompt('End (HH:MM)', new Date(s.end).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}));
if(!start||!end)return;
let d=new Date(s.start);
let [sh,sm]=start.split(':');
let [eh,em]=end.split(':');
d.setHours(sh,sm);
let newStart=d.getTime();
d.setHours(eh,em);
let newEnd=d.getTime();
pushUndo();
sessions[i]={...s,start:newStart,end:newEnd};
save();render();toast('Edited');
}

function del(i){pushUndo();sessions.splice(i,1);save();render();toast('Deleted');}

function render(){
let f=filterTag.value;
let grouped={};

sessions.forEach((s,i)=>{
if(f!=='all' && s.tag!==f) return;
let d=new Date(s.start).toDateString();
if(!grouped[d])grouped[d]=[];
grouped[d].push({s,i});
});

list.innerHTML='';

for(let d in grouped){
let div=document.createElement('div');
div.className='group';
div.innerHTML=`<b>${d}</b>`;

grouped[d].forEach(obj=>{
let s=obj.s;
let i=obj.i;
let dur=Math.round((s.end-s.start)/60000);
let el=document.createElement('div');
el.className='session';
el.innerHTML=`<span>${s.tag} ${dur}m</span>
<div>
<button onclick="editSession(${i})">Edit</button>
<button onclick="del(${i})">X</button>
</div>`;
div.appendChild(el);
});

list.appendChild(div);
}
}

renderTags();render();
</script>

</body>
</html>
